# One command: `docker compose up -d --build`
#
#   app         the RSVP API + dashboard (Node + SQLite), bound to the internal
#               Docker network ONLY — it publishes NO host ports.
#   cloudflared Cloudflare Tunnel. Makes an OUTBOUND-only connection to Cloudflare
#               and forwards api.yourdomain.com -> app:3000. No inbound ports are
#               opened on the VPS, so nothing collides with Wazuh (443/1514/9200)
#               and the attack surface is not widened.
#
# Fill in .env first (copy from .env.example): TUNNEL_TOKEN, ADMIN_TOKEN, ALLOWED_ORIGIN.

services:
  app:
    build: .
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: "3000"
      DATA_DIR: /app/data
      ADMIN_TOKEN: ${ADMIN_TOKEN}
      ALLOWED_ORIGIN: ${ALLOWED_ORIGIN}
    volumes:
      - rsvp_data:/app/data          # SQLite DB persists across rebuilds
    expose:
      - "3000"                       # internal only — NOT published to the host
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    depends_on:
      - app
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: ${TUNNEL_TOKEN}   # from the Cloudflare Zero Trust dashboard
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

volumes:
  rsvp_data:
