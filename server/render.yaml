# Render Blueprint (optional one-click deploy).
# In Render: New + -> Blueprint -> connect this repo. Render reads this file.
# You still set DATABASE_URL in the dashboard (marked sync:false so it's not in git).
services:
  - type: web
    name: wedding-rsvp
    runtime: docker
    rootDir: server
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: ALLOWED_ORIGIN
        value: https://mk-meden.github.io
      - key: DATABASE_URL
        sync: false          # paste your Neon connection string in the dashboard
